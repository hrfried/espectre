# ESPectre - ESP32-C3 QEMU Smoke Test
# Used exclusively for CI boot testing in QEMU.
# WiFi PHY is not emulated by QEMU; the PHY assert is filtered in the CI action.

esphome:
  name: espectre
  friendly_name: ESPectre
  min_version: 2026.3.0
  project:
    name: francescopace.espectre
    version: "ci"

esp32:
  variant: ESP32C3
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../../../../components
    components: [ espectre ]

espectre:
  id: espectre_csi

wifi:
  ap:
    ssid: "ESPectre Fallback"

logger:
  hardware_uart: UART0
