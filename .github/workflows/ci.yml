name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:  # Manual trigger to warm up cache

# Permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  detect-push-origin:
    name: Detect Push Origin
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.detect.outputs.run_ci }}
      is_pr_push: ${{ steps.detect.outputs.is_pr_push }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Detect if push commit belongs to merged PR
        id: detect
        uses: actions/github-script@v8
        with:
          script: |
            // Default: run CI unless we prove this is a merged-PR push to develop.
            if (context.eventName !== "push" || context.ref !== "refs/heads/develop") {
              core.setOutput("run_ci", "true");
              core.setOutput("is_pr_push", "false");
              core.info("Not a push on develop. CI will run.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const response = await github.request("GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls", {
              owner,
              repo,
              commit_sha: sha,
              mediaType: { previews: ["groot"] }
            });

            const relatedMergedPr = response.data.find((pr) =>
              pr &&
              pr.merged_at &&
              pr.base &&
              pr.base.ref === "develop"
            );

            const isPrPush = Boolean(relatedMergedPr);
            core.setOutput("is_pr_push", isPrPush ? "true" : "false");
            core.setOutput("run_ci", isPrPush ? "false" : "true");

            if (isPrPush) {
              core.info(`Detected merged PR push (PR #${relatedMergedPr.number}). Skipping duplicate CI on develop push.`);
            } else {
              core.info("No merged PR associated with this push commit. Treating as direct push; CI will run.");
            }

  build-docs:
    name: Build Documentation
    needs: detect-push-origin
    if: needs.detect-push-origin.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install Dependencies
        run: pip install markdown
      
      - name: Build Documentation
        run: python .github/scripts/build_docs.py
      
      - name: Build Search Index
        run: npx -y pagefind --site docs --output-path docs/_pagefind --glob "documentation/**/*.html"
      
      - name: Verify Build
        run: |
          test -f docs/sitemap.xml
          test -d docs/documentation
          test -d docs/_pagefind
          echo "Documentation build verified!"
      
      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      
      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy-docs:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-indexnow:
    name: Notify IndexNow
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: deploy-docs
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Extract URLs and notify IndexNow
        run: |
          # Extract URLs from sitemap
          URLS=$(grep -oP '(?<=<loc>)[^<]+' docs/sitemap.xml | jq -R -s -c 'split("\n") | map(select(length > 0))')
          
          # Notify IndexNow (Bing, Yandex, Seznam, Naver)
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"espectre.dev\",\"key\":\"1a2e73ccf9558a06830546c288699e0c\",\"keyLocation\":\"https://espectre.dev/1a2e73ccf9558a06830546c288699e0c.txt\",\"urlList\":$URLS}"
          
          echo "Notified IndexNow with $(echo $URLS | jq length) URLs"

  test-cpp:
    name: C++ Unit Tests
    needs: detect-push-origin
    if: needs.detect-push-origin.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: pio-test-${{ hashFiles('test/platformio.ini') }}
          restore-keys: |
            pio-test-
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install platformio gcovr
      
      - name: Run Tests with Coverage
        working-directory: test
        run: ./run_coverage.sh --ci
      
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: test/coverage.xml,test/coverage.lcov
          flags: cpp
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-python:
    name: Python Unit Tests (micro-espectre)
    needs: detect-push-origin
    if: needs.detect-push-origin.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install Dependencies
        run: pip install pytest pytest-cov numpy
      
      - name: Run Tests with Coverage
        working-directory: micro-espectre
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
      
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: micro-espectre/coverage.xml
          flags: python
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Pre-cache job: downloads toolchain once, shared by all build jobs
  setup-cache:
    name: Setup Build Cache
    needs: detect-push-origin
    if: needs.detect-push-origin.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Cache PlatformIO
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.esphome/cache
          key: pio-espidf-${{ hashFiles('components/espectre/**') }}
          restore-keys: |
            pio-espidf-
      
      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install esphome

  build:
    name: ${{ matrix.qemu_chip && 'Smoke Test' || 'Build' }} ${{ matrix.chip }}
    runs-on: ubuntu-latest
    needs: [detect-push-origin, setup-cache]
    if: needs.detect-push-origin.outputs.run_ci == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Standard builds (no QEMU)
          # config: production file (GitHub component), config_dev: local component
          - chip: ESP32
            config: examples/espectre-esp32.yaml
            config_dev: examples/espectre-esp32-dev.yaml
          - chip: ESP32-S2
            config: examples/espectre-s2.yaml
            config_dev: examples/espectre-s2-dev.yaml
          - chip: ESP32-S3
            config: examples/espectre-s3.yaml
            config_dev: examples/espectre-s3-dev.yaml
          - chip: ESP32-C3
            config: examples/espectre-c3.yaml
            config_dev: examples/espectre-c3-dev.yaml
          - chip: ESP32-C5
            config: examples/espectre-c5.yaml
            config_dev: examples/espectre-c5-dev.yaml
          - chip: ESP32-C6
            config: examples/espectre-c6.yaml
            config_dev: examples/espectre-c6-dev.yaml
          # QEMU smoke tests (.github/actions/qemu-smoke-test/configs/)
          # Supported targets: ESP32, ESP32-S3, ESP32-C3 (official Espressif QEMU fork)
          # WiFi PHY is not emulated by QEMU; the PHY assert is filtered in the CI action
          # ESP32-C6 and newer chips are not supported by the Espressif QEMU fork
          - chip: ESP32
            config: .github/actions/qemu-smoke-test/configs/esp32.yaml
            qemu_chip: esp32
            qemu_arch: xtensa
            qemu_machine: esp32
          - chip: ESP32-S3
            config: .github/actions/qemu-smoke-test/configs/esp32s3.yaml
            qemu_chip: esp32s3
            qemu_arch: xtensa
            qemu_machine: esp32s3
          - chip: ESP32-C3
            config: .github/actions/qemu-smoke-test/configs/esp32c3.yaml
            qemu_chip: esp32c3
            qemu_arch: riscv32
            qemu_machine: esp32c3
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Restore PlatformIO Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.esphome/cache
          key: pio-espidf-${{ hashFiles('components/espectre/**') }}
          restore-keys: |
            pio-espidf-
      
      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install esphome
      
      - name: Create secrets.yaml for dev configs
        if: github.ref != 'refs/heads/main' && !matrix.qemu_chip
        run: |
          cat > examples/secrets.yaml << 'EOF'
          wifi_ssid: CI_TEST
          wifi_password: ci_password
          EOF
      
      - name: Compile
        run: |
          # QEMU configs always use local component (no branch distinction)
          # Standard configs use -dev (local component) on develop/PR, production on main
          if [ -n "${{ matrix.qemu_chip }}" ]; then
            esphome compile ${{ matrix.config }}
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            esphome compile ${{ matrix.config }}
          else
            esphome compile ${{ matrix.config_dev }}
          fi
      
      # QEMU smoke test for UART builds
      - name: Run QEMU smoke test
        if: matrix.qemu_chip
        uses: ./.github/actions/qemu-smoke-test
        with:
          chip: ${{ matrix.qemu_chip }}
          arch: ${{ matrix.qemu_arch }}
          machine: ${{ matrix.qemu_machine }}
      
      - name: Upload QEMU logs
        if: matrix.qemu_chip && always()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-logs-${{ matrix.qemu_machine }}
          path: qemu_output.log
          retention-days: 7

